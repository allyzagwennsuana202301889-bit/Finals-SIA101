<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lessons API Frontend</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 5px 10px;
      margin-top: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .delete { background: #e74c3c; color: white; }
    .update { background: #3498db; color: white; }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .add-box {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .btn-add {
      background: #47A1CC;
      color: white;
      width: 100%;
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Lessons Manager</h1>

  <!-- Add Lesson -->
  <div class="add-box">
    <h3>Add New Lesson</h3>
    <input id="subject" placeholder="Subject">
    <input id="uploadedby" placeholder="Uploaded By">
    <textarea id="description" placeholder="Description"></textarea>
    <button class="btn-add" onclick="addLesson()">Add Lesson</button>
  </div>

  <!-- Lessons List -->
  <div id="lessons"></div>
</div>

<script>
const API = "http://localhost:3000/api/lessons";

// Load lessons
async function loadLessons() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("lessons");
  container.innerHTML = "";

  data.forEach(lesson => {
    container.innerHTML += `
      <div class="card">
        <h3>${lesson.subject}</h3>
        <p><b>Uploaded by:</b> ${lesson.uploadedby}</p>
        <p>${lesson.description}</p>

        <textarea id="desc-${lesson.id}" placeholder="Update description"></textarea>

        <button class="update" onclick="updateLesson(${lesson.id})">
          Update
        </button>

        <button class="delete" onclick="deleteLesson(${lesson.id})">
          Delete
        </button>
      </div>
    `;
  });
}

// Add lesson
async function addLesson() {
  const subject = document.getElementById("subject").value;
  const uploadedby = document.getElementById("uploadedby").value;
  const description = document.getElementById("description").value;

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ subject, uploadedby, description })
  });

  loadLessons();
}

// Update lesson
async function updateLesson(id) {
  const description = document.getElementById(`desc-${id}`).value;

  await fetch(`${API}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ description })
  });

  loadLessons();
}

// Delete lesson
async function deleteLesson(id) {
  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });

  loadLessons();
}

// Initial load
loadLessons();
</script>

</body>
</html>
